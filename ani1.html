<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Way Traffic Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2c3e50;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
    
        }

        /* Road Setup */
        .road {
            position: relative;
            width: 100%;
            height: 300px;
            background: #333;
            border-top: 10px solid #555;
            border-bottom: 10px solid #555;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Center Divider Line */
        .road::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, #f1c40f 50%, transparent 50%);
            background-size: 80px 100%;
            transform: translateY(-50%);
        }

        /* Lanes */
        .lane {
            position: relative;
            width: 100%;
            height: 45%;
        }

        /* Base Car Styling */
        .car {
            position: absolute;
            width: 90px;
            height: 45px;
            border-radius: 10px 15px 5px 5px;
            bottom: 15px;
        }

        /* Car Windows and Wheels */
        .car::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 15px;
            width: 50px;
            height: 15px;
            background: #e0e0e0;
            border-radius: 5px 10px 0 0;
        }

        .car::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 12px;
            width: 16px;
            height: 16px;
            background: #111;
            border-radius: 50%;
            box-shadow: 50px 0 #111;
        }

        /* Color Variations */
        .red { background: #e74c3c; }
        .blue { background: #3498db; }
        .green { background: #2ecc71; }
        .orange { background: #e67e22; }

        /* --- Top Lane: Moving Left to Right --- */
        .lane-top .car {
            left: -100px;
            animation: moveRight linear infinite;
        }

        @keyframes moveRight {
            0% { left: -100px; }
            100% { left: 100%; }
        }

        /* --- Bottom Lane: Moving Right to Left --- */
        .lane-bottom .car {
            right: -100px;
            transform: scaleX(-1); /* Flips the car to face left */
            animation: moveLeft linear infinite;
        }

        @keyframes moveLeft {
            0% { right: -100px; }
            100% { right: 100%; }
        }

        /* --- Timing and Spacing Delays --- */
        .t1 { animation-duration: 6s !important; animation-delay: 0s; }
        .t2 { animation-duration: 4s !important; animation-delay: 1.5s; }
        .t3 { animation-duration: 8s !important; animation-delay: 3s; }
        .t4 { animation-duration: 5s !important; animation-delay: 0.5s; }

        .b1 { animation-duration: 5s !important; animation-delay: 0s; }
        .b2 { animation-duration: 7s !important; animation-delay: 2s; }
        .b3 { animation-duration: 4s !important; animation-delay: 4s; }
        .b4 { animation-duration: 6s !important; animation-delay: 1s; }

    </style>
</head>
<body>

    <div class="road">

        <div class="lane lane-top">
            <div class="car red t1"></div>
            <div class="car blue t2"></div>
            <div class="car green t3"></div>
            <div class="car orange t4"></div>
        </div>
        
        <div class="lane lane-bottom">
            <div class="car orange b1"></div>
            <div class="car red b2"></div>
            <div class="car blue b3"></div>
            <div class="car green b4"></div>
        </div>
    </div>

</body>
</html>
